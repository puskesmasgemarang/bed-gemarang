<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Rawat Inap · Puskesmas Gemarang Ngawi</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* CSS SAMA SEPERTI SEBELUMNYA */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#059669;--gl:#d1fae5;--gm:#6ee7b7;--r:#dc2626;--rl:#fee2e2;--y:#d97706;--yl:#fef3c7;--bg:#f0fdf4;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.view{display:none}.view.active{display:block;animation:fadeIn 0.25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.hdr{background:linear-gradient(150deg,#064e3b,#065f46,#059669);padding:24px 16px 20px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05)}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;position:relative}
.hdr-logo{width:46px;height:46px;background:rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0}
.hdr-name h1{font-size:15px;font-weight:800;color:#fff;line-height:1.2}
.hdr-name p{font-size:10.5px;color:rgba(255,255,255,0.6);margin-top:2px}
.live-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:10px;color:#fff;font-weight:700;margin-bottom:14px;position:relative}
.ldot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;position:relative}
.stat{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:11px;padding:11px 6px;text-align:center}
.stat .n{font-size:24px;font-weight:800;color:#fff;line-height:1}
.stat .n.g{color:#4ade80}.stat .n.r{color:#f87171}
.stat .t{font-size:9px;color:rgba(255,255,255,.55);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* BANNER */
.banner{margin:14px;border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:11px}
.banner.ok{background:var(--gl);border:1.5px solid var(--gm)}
.banner.warn{background:var(--yl);border:1.5px solid #fde68a}
.banner.full{background:var(--rl);border:1.5px solid #fca5a5}
.bi{font-size:26px;flex-shrink:0}
.bt strong{font-size:13.5px;font-weight:800;display:block}
.bt span{font-size:11px;color:var(--muted);margin-top:1px;display:block}
.ok .bt strong{color:var(--g)}.warn .bt strong{color:var(--y)}.full .bt
